actions:
  generate_discussions: true
  generate_annotations: false
  export_dataset: true


logging:
  print_to_terminal: true
  write_to_file: true
  logs_dir: "/media/SSD_4TB_2/dtsirmpas/projects/synthetic_moderation_experiments/logs"
  level: "debug"


discussion_model:
  disallowed_strings: ["```", "\""]
  model_path: "unsloth/Llama-3.3-70B-Instruct-bnb-4bit"
  model_pseudoname: "llama-70b"  # only used for record keeping
  max_tokens: 1500
  ctx_width_tokens: 4096


discussions:
  files:
    topics_dir: "/media/SSD_4TB_2/dtsirmpas/projects/synthetic_moderation_experiments/data/discussions_input/topics/polarized"
    user_persona_dir: "/media/SSD_4TB_2/dtsirmpas/projects/synthetic_moderation_experiments/data/discussions_input/personas/"
    user_instructions_path: "/media/SSD_4TB_2/dtsirmpas/projects/synthetic_moderation_experiments/data/discussions_input/user_instructions/basic.txt"
    mod_instructions_path: "/media/SSD_4TB_2/dtsirmpas/projects/synthetic_moderation_experiments/data/discussions_input/mod_instructions/moderation_game.txt" 
    output_dir: "/media/SSD_4TB_2/dtsirmpas/projects/synthetic_moderation_experiments/data/discussions_output/ablation/prompts/basic_instructions" 
  
  experiment_variables:
    include_mod: true # whether a moderator will be included in the experiments
    num_experiments: 20
    num_users: 7 # how many personas will be used in each experiment
    context_prompt: "You are a human participating in an online chatroom."
  
  turn_taking:
    num_turns: 20
    history_ctx_len: 3
    turn_manager_type: "random_weighted"
    respond_probability: 0.4 # only applicable for random_weighted turn manager type 

dataset_export:
  export_path: "/media/SSD_4TB_2/dtsirmpas/projects/synthetic_moderation_experiments/data/abl_turn_taking.csv"
  discussion_root_dir: "/media/SSD_4TB_2/dtsirmpas/projects/synthetic_moderation_experiments/data/discussions_output"
  annotation_root_dir: "/media/SSD_4TB_2/dtsirmpas/projects/synthetic_moderation_experiments/data/annotation_output"