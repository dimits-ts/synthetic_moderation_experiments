actions:
  generate_discussions: true
  generate_annotations: false
  export_dataset: true


logging:
  print_to_terminal: true
  write_to_file: true
  logs_dir: "/media/SSD_4TB_2/dtsirmpas/projects/synthetic_moderation_experiments/logs"
  level: "debug"


discussion_model:
  disallowed_strings: ["```", "\""]
  model_path: "unsloth/Llama-3.3-70B-Instruct-bnb-4bit"
  model_pseudoname: "llama-70b"  # only used for record keeping
  max_tokens: 1500
  ctx_width_tokens: 4096


discussions:
  files:
    topics_dir: "/media/SSD_4TB_2/dtsirmpas/projects/synthetic_moderation_experiments/data/discussions_input/topics/polarized"
    user_persona_path: "/media/SSD_4TB_2/dtsirmpas/projects/synthetic_moderation_experiments/data/discussions_input/personas/personas.json"
    vanilla_instructions_path: "/media/SSD_4TB_2/dtsirmpas/projects/synthetic_moderation_experiments/data/discussions_input/user_instructions/vanilla.txt"
    troll_instructions_path: "/media/SSD_4TB_2/dtsirmpas/projects/synthetic_moderation_experiments/data/discussions_input/user_instructions/troll.txt"
    mod_instructions_path: "/media/SSD_4TB_2/dtsirmpas/projects/synthetic_moderation_experiments/data/discussions_input/mod_instructions/moderation_game.txt" 
    output_dir: "/media/SSD_4TB_2/dtsirmpas/projects/synthetic_moderation_experiments/data/discussions_output/raw" 
    export_dir: "/media/SSD_4TB_2/dtsirmpas/projects/synthetic_moderation_experiments/data/discussions_output/datasets"
  
  experiment_variables:
    include_mod: true # whether a moderator will be included in the experiments
    num_experiments: 2
    num_users: 7 # how many personas will be used in each experiment
    context_prompt: "Pretend that you are a human participating in an online forum with the provided characteristics and respond as that human would."
  
  turn_taking:
    num_turns: 3
    history_ctx_len: 3
    turn_manager_type: "random_weighted"
    respond_probability: 0.4 # only applicable for random_weighted turn manager type 

